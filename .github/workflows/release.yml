name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run tests
        run: go test -v -race ./...

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o ai-model-bom-linux-amd64 .
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o ai-model-bom-linux-arm64 .
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o ai-model-bom-darwin-arm64 .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ai-model-bom-linux-amd64
            ai-model-bom-linux-arm64
            ai-model-bom-darwin-arm64

  docker:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
